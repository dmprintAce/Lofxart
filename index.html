<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Expérience Sonore Nocturne - V5 Active Black Hole Core</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* Overlay d'interaction initiale */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            z-index: 20;
            transition: opacity 0.8s ease;
            cursor: pointer;
            padding: 20px;
        }
        #ui-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        #status-text {
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        #sub-status-text {
            font-size: 0.75rem;
            color: #a0b0d0;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Panneau de contrôle */
        #controls-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(4, 4, 8, 0.4);
            padding: 12px 16px;
            border-radius: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: 320px;
            user-select: none;
            transition: opacity 0.3s ease, background-color 0.3s ease, transform 0.3s ease;
            opacity: 0.2; 
        }
        
        @media (pointer: fine) {
            #controls-container:hover {
                opacity: 1;
                background: rgba(4, 4, 8, 0.75);
            }
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #play-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        #play-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 1);
        }
        #play-btn:hover svg {
            fill: #000000;
        }
        #play-btn svg {
            width: 12px;
            height: 12px;
            fill: #ffffff;
            transition: fill 0.2s ease;
        }
        
        .progress-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            color: #8a9bb4;
            font-variant-numeric: tabular-nums;
        }
        .slider-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 0 6px rgba(255,255,255,0.5);
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            width: 100%;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        .rhythm-column {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
        }
        .rhythm-column label {
            font-size: 0.6rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #a0b0d0;
        }
        .rhythm-label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #sens-val {
            font-size: 0.65rem;
            font-weight: 600;
            color: #ffffff;
        }


        @media (max-width: 768px) {
            #controls-container {
                width: calc(100% - 32px);
                left: 16px;
                bottom: 16px;
                opacity: 0.90; 
                background: rgba(6, 6, 12, 0.75);
                padding: 14px 16px;
                gap: 12px;
            }
            #play-btn {
                width: 38px;
                height: 38px;
            }
            input[type="range"] {
                height: 4px; 
            }
            input[type="range"]::-webkit-slider-thumb {
                width: 14px;
                height: 14px;
            }
            #status-text {
                font-size: 0.8rem;
            }
            #sub-status-text {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="visualizer"></canvas>

    <div id="project-branding">L0fxArt</div>

    <style>
        #project-branding {
            position: absolute;
            top: 95%;
            left: 95%;
            transform: translate(-70%, -70%);
            font-family: 'Segoe UI', sans-serif;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.15); /* Transparence élevée pour la subtilité */
            pointer-events: none; /* Le texte ne bloque pas les clics */
            z-index: 5;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); /* Effet néon très léger */
            user-select: none;
            white-space: nowrap;
        }
    </style>

    <div id="ui-overlay" onclick="startExperience()">
        <div id="status-text">CLIQUEZ POUR LANCER L'EXPÉRIENCE</div>
        <div id="sub-status-text">Audio intégré : down now - Remix</div>
    </div>

    <div id="controls-container">
        <div class="player-row">
            <button id="play-btn" title="Lecture / Pause">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div class="progress-container">
                <div class="slider-wrapper">
                    <input type="range" id="progress-slider" min="0" max="100" value="0">
                </div>
                <div class="time-labels">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const uiOverlay = document.getElementById('ui-overlay');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressSlider = document.getElementById('progress-slider');
        const currentTimeLabel = document.getElementById('current-time');
        const totalTimeLabel = document.getElementById('total-time');
        const AUDIO_FILE_PATH = "audio/down-now-Remix.mp3";

        let audioCtx;
        let analyser;
        let dataArray;
        let isSetup = false;
        
        let useBufferMode = false;
        let audioBuffer = null;
        let bufferSourceNode = null;
        let localAudioElement = null;
        
        let startTime = 0;
        let pausedTime = 0;
        let isPlaying = false;

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let targetMX = window.innerWidth / 2;
        let targetMY = window.innerHeight / 2;
        const mouseEasing = 0.04;

        let smoothBass = 0;
        let smoothMid = 0;
        let smoothHigh = 0;

        let sparks = [];
        let baseHue = 215; 
        let targetHue = 215;

        const colorPalette = [215, 290, 340, 25, 150, 45]; 

        let totalRays = 85;     
        let dotsPerRay = 40;     

        let hoverWaveTime = 0;
        let hoverIntensity = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            targetMX = window.innerWidth / 2;
            targetMY = window.innerHeight / 2;

            if (window.innerWidth < 768) {
                totalRays = 50;     
                dotsPerRay = 25;     
            } else {
                totalRays = 85;     
                dotsPerRay = 40;     
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('mousemove', (e) => {
            targetMX = e.clientX;
            targetMY = e.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                targetMX = e.touches[0].clientX;
                targetMY = e.touches[0].clientY;
            }
        }, { passive: true });

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                targetMX = e.touches[0].clientX;
                targetMY = e.touches[0].clientY;
            }
        }, { passive: true });

        // Clic générant une déflagration de feux d'artifice éjectés à haute vélocité
        canvas.addEventListener('click', (e) => {
            if (!isSetup) return;
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            const currentIndex = colorPalette.indexOf(targetHue);
            const nextIndex = (currentIndex + 1) % colorPalette.length;
            targetHue = colorPalette[nextIndex];

            const burstCount = window.innerWidth < 768 ? 50 : 110; 
            const minScreenDim = Math.min(canvas.width, canvas.height);
            const currentHoleRadius = minScreenDim * 0.16;

            for (let i = 0; i < burstCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                // 60% des particules du clic s'échappent complètement sous forme de feu d'artifice
                const isFirework = Math.random() < 0.60; 
                
                const radialSpeed = isFirework ? (3.5 + Math.random() * 6.0) : (1.0 + Math.random() * 2.5); 
                const swirlSpeed = isFirework ? ((Math.random() - 0.5) * 1.5) : ((2.0 + Math.random() * 4.0) * (Math.random() > 0.5 ? 1 : -1));

                sparks.push({
                    x: centerX + Math.cos(angle) * currentHoleRadius,
                    y: centerY + Math.sin(angle) * currentHoleRadius,
                    vx: Math.cos(angle) * radialSpeed - Math.sin(angle) * swirlSpeed,
                    vy: Math.sin(angle) * radialSpeed + Math.cos(angle) * swirlSpeed,
                    alpha: 1.0,
                    decay: isFirework ? (0.005 + Math.random() * 0.007) : (0.006 + Math.random() * 0.01), 
                    size: isFirework ? (0.6 + Math.random() * 1.4) : (0.5 + Math.random() * 1.2), 
                    hue: targetHue + (Math.random() - 0.5) * (isFirework ? 45 : 25),
                    isFirework: isFirework,
                    friction: isFirework ? 0.985 : 0.975
                });
            }
        });

        async function startExperience() {
            if (isSetup) return;

            await enterFullscreenMode();

            uiOverlay.classList.add('fade-out');
            initAudioContext();
            animate();
            isSetup = true;

            await loadAndPlayIntegratedAudio();
        }

        async function enterFullscreenMode() {
            const root = document.documentElement;

            try {
                if (root.requestFullscreen) {
                    await root.requestFullscreen();
                } else if (root.webkitRequestFullscreen) {
                    root.webkitRequestFullscreen();
                } else if (root.msRequestFullscreen) {
                    root.msRequestFullscreen();
                }
            } catch (err) {
                console.warn("Le plein écran n'a pas pu être activé automatiquement sur ce navigateur :", err);
            }
        }

        function initAudioContext() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 1024;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            playBtn.addEventListener('click', togglePlay);
            progressSlider.addEventListener('input', seekAudio);
        }

        async function loadAndPlayIntegratedAudio() {
            try {
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                localAudioElement = new Audio(AUDIO_FILE_PATH);
                localAudioElement.preload = "auto";
                localAudioElement.playsInline = true;
                localAudioElement.volume = 1.0;

                localAudioElement.addEventListener('timeupdate', () => {
                    if (!useBufferMode) updateProgressUI(localAudioElement.currentTime, localAudioElement.duration);
                });

                localAudioElement.addEventListener('loadedmetadata', () => {
                    if (!useBufferMode) totalTimeLabel.innerText = formatTime(localAudioElement.duration);
                });

                localAudioElement.addEventListener('ended', () => {
                    isPlaying = false;
                    updatePlayerIcons();
                });

                localAudioElement.addEventListener('error', () => {
                    console.error("Fichier audio introuvable ou illisible :", AUDIO_FILE_PATH);
                    document.getElementById('sub-status-text').innerText = "Erreur : audio introuvable dans /audio/";
                });

                const source = audioCtx.createMediaElementSource(localAudioElement);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);

                await localAudioElement.play();

                isPlaying = true;
                useBufferMode = false;
                updatePlayerIcons();
            } catch (err) {
                console.error("Lecture audio impossible depuis le chemin intégré :", AUDIO_FILE_PATH, err);
                isPlaying = false;
                updatePlayerIcons();
            }
        }

        function playBuffer(timeOffset) {
            if (bufferSourceNode) {
                try { bufferSourceNode.stop(); } catch(e){}
            }
            bufferSourceNode = audioCtx.createBufferSource();
            bufferSourceNode.buffer = audioBuffer;
            bufferSourceNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            startTime = audioCtx.currentTime - timeOffset;
            bufferSourceNode.start(0, timeOffset);
            isPlaying = true;
            updatePlayerIcons();
            
            bufferSourceNode.onended = () => {
                if (isPlaying && (audioCtx.currentTime - startTime) >= audioBuffer.duration) {
                    isPlaying = false;
                    pausedTime = 0;
                    updatePlayerIcons();
                }
            };
        }

        function togglePlay() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (useBufferMode) {
                if (isPlaying) {
                    pausedTime = audioCtx.currentTime - startTime;
                    if (bufferSourceNode) bufferSourceNode.stop();
                    isPlaying = false;
                } else {
                    if (pausedTime >= audioBuffer.duration) pausedTime = 0;
                    playBuffer(pausedTime);
                }
                updatePlayerIcons();
            } else {
                if (!localAudioElement) return;

                if (localAudioElement.paused) {
                    localAudioElement.play().then(() => {
                        isPlaying = true;
                        updatePlayerIcons();
                    }).catch(err => {
                        console.error("Impossible de relancer l'audio :", err);
                        isPlaying = false;
                        updatePlayerIcons();
                    });
                } else {
                    localAudioElement.pause();
                    isPlaying = false;
                    updatePlayerIcons();
                }
            }
        }

        function seekAudio() {
            if (useBufferMode && audioBuffer) {
                const targetTime = (progressSlider.value / 100) * audioBuffer.duration;
                if (isPlaying) { playBuffer(targetTime); }
                else { pausedTime = targetTime; }
                currentTimeLabel.innerText = formatTime(targetTime);
            } else if (localAudioElement && !isNaN(localAudioElement.duration)) {
                const targetTime = (progressSlider.value / 100) * localAudioElement.duration;
                localAudioElement.currentTime = targetTime;
            }
        }

        function updateProgressUI(current, duration) {
            if (!isNaN(duration) && duration > 0) {
                const pct = (current / duration) * 100;
                progressSlider.value = pct;
                currentTimeLabel.innerText = formatTime(current);
            }
        }

        function updatePlayerIcons() {
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        function formatTime(secs) {
            if (isNaN(secs) || secs < 0) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            baseHue += (targetHue - baseHue) * 0.05;
            mouseX += (targetMX - mouseX) * mouseEasing;
            mouseY += (targetMY - mouseY) * mouseEasing;

            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let bass = 0;
            let mid = 0;
            let high = 0;

            if (isPlaying && analyser) {
                analyser.getByteFrequencyData(dataArray);
                const k = dataArray.length;
                
                const bassEnd = Math.floor(k * 0.08);
                const midEnd = Math.floor(k * 0.45);

                for (let i = 0; i < bassEnd; i++) { bass += dataArray[i]; }
                for (let i = bassEnd; i < midEnd; i++) { mid += dataArray[i]; }
                for (let i = midEnd; i < k; i++) { high += dataArray[i]; }

                bass = (bass / bassEnd) / 255;
                mid = (mid / (midEnd - bassEnd)) / 255;
                high = (high / (k - midEnd)) / 255;
            }

            smoothBass += (bass - smoothBass) * 0.22;
            smoothMid += (mid - smoothMid) * 0.16;
            smoothHigh += (high - smoothHigh) * 0.16;

            const time = performance.now() * 0.001 * (1.0 + smoothBass * 0.4);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const minScreenDim = Math.min(canvas.width, canvas.height);
            
            const centralPulse = smoothBass * (minScreenDim * 0.08);
            const holeRadius = minScreenDim * 0.16 + centralPulse;
            const glowRadius = minScreenDim * 0.42 + (smoothBass * 0.15 + smoothMid * 0.20) * minScreenDim;
            
            const viewOffsetX = (centerX - mouseX);
            const viewOffsetY = (centerY - mouseY);

            const kineticCenterX = centerX;
            const kineticCenterY = centerY;

            const coreX = kineticCenterX + viewOffsetX * 0.02;
            const coreY = kineticCenterY + viewOffsetY * 0.02;

            const distToCore = Math.hypot(targetMX - coreX, targetMY - coreY);
            const isHoveringCore = isSetup && (distToCore < holeRadius);
            
            if (isHoveringCore) {
                hoverIntensity += (1.0 - hoverIntensity) * 0.12;
                hoverWaveTime += 0.08;
            } else {
                hoverIntensity += (0.0 - hoverIntensity) * 0.06;
            }

            // Génération procédurale bimodale basée sur le rythme
            if (smoothBass > 0.15) {
                const sparkCount = Math.floor(smoothBass * (window.innerWidth < 768 ? 3 : 6)); 
                for (let k = 0; k < sparkCount; k++) {
                    const angle = Math.random() * Math.PI * 2;
                    
                    // 25% de chances de générer une étincelle type "feu d'artifice" à haute énergie
                    const isFirework = Math.random() < 0.25; 
                    
                    let radialSpeed, swirlSpeed, decay, friction;
                    if (isFirework) {
                        radialSpeed = 3.0 + smoothBass * 4.5; // Vélocité d'échappement élevée
                        swirlSpeed = (Math.random() - 0.5) * 1.0;  // Trajectoire plus rectiligne vers l'extérieur
                        decay = 0.005 + Math.random() * 0.007;     // Durée de vie plus longue pour s'éloigner du centre
                        friction = 0.985;                          // Moins de résistance pour préserver l'impulsion
                    } else {
                        radialSpeed = 0.3 + smoothBass * 1.2;
                        swirlSpeed = (1.2 + smoothMid * 3.5) * (Math.random() > 0.5 ? 1 : -1);
                        decay = 0.004 + Math.random() * 0.008;
                        friction = 0.975;
                    }
                    
                    sparks.push({
                        x: kineticCenterX + Math.cos(angle) * holeRadius,
                        y: kineticCenterY + Math.sin(angle) * holeRadius,
                        vx: Math.cos(angle) * radialSpeed - Math.sin(angle) * swirlSpeed,
                        vy: Math.sin(angle) * radialSpeed + Math.cos(angle) * swirlSpeed,
                        alpha: 1.0,
                        decay: decay,
                        size: isFirework ? (0.5 + Math.random() * 1.3) : (0.4 + Math.random() * 1.1 + smoothBass * 0.5),
                        hue: targetHue + (Math.random() - 0.5) * (isFirework ? 40 : 20),
                        isFirework: isFirework,
                        friction: friction
                    });
                }
            }

            if (useBufferMode && isPlaying && audioCtx) {
                const currentSecs = audioCtx.currentTime - startTime;
                updateProgressUI(currentSecs, audioBuffer.duration);
            }

            // 1. Rendu du Halo (Glow) Arrière
            const glowGrad = ctx.createRadialGradient(coreX, coreY, holeRadius * 0.5, coreX, coreY, glowRadius);
            glowGrad.addColorStop(0, `hsla(${baseHue}, 90%, 55%, ${0.28 * (0.6 + smoothBass * 0.4)})`);
            glowGrad.addColorStop(0.25, `hsla(${baseHue + 25}, 85%, 45%, ${0.12 * (0.5 + smoothMid * 0.5)})`);
            glowGrad.addColorStop(0.6, `hsla(${baseHue - 20}, 70%, 30%, 0.03)`);
            glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glowGrad;
            ctx.beginPath();
            ctx.arc(coreX, coreY, glowRadius, 0, Math.PI * 2);
            ctx.fill();

            // 2. Rendu de la Matrice Quantique de Points
            ctx.globalCompositeOperation = 'source-over';
            for (let r = 0; r < totalRays; r++) {
                const baseAngle = (r / totalRays) * Math.PI * 2 + (time * 0.015);
                
                for (let d = 0; d < dotsPerRay; d++) {
                    const normD = d / dotsPerRay;
                    const matrixPulse = 1.0 + smoothBass * 0.15 * (1.0 - normD);
                    const baseDistance = holeRadius + Math.pow(normD, 1.3) * (minScreenDim * 0.95);
                    
                    let hoverRipple = 0;
                    if (hoverIntensity > 0.01) {
                        const ripplePhase = (baseDistance * 0.018) - hoverWaveTime;
                        hoverRipple = Math.sin(ripplePhase) * 22 * hoverIntensity * (1.0 - normD);
                    }
                    
                    const distance = (baseDistance * matrixPulse) + hoverRipple;
                    const waveFrequency = 0.012;
                    const wavePhase = distance * waveFrequency - time * 1.6;
                    
                    let angleOffset = Math.sin(wavePhase) * (0.03 + smoothMid * 0.12);
                    angleOffset += Math.cos(baseAngle * 3 - time * 0.5) * 0.015 * smoothHigh;
                    
                    const finalAngle = baseAngle + angleOffset;

                    let ptX = kineticCenterX + Math.cos(finalAngle) * distance;
                    let ptY = kineticCenterY + Math.sin(finalAngle) * distance;

                    ptX += viewOffsetX * (normD * 0.28);
                    ptY += viewOffsetY * (normD * 0.28);

                    let dotSize = 0.7 + (1.0 - normD) * 1.4 + (smoothBass * 0.8);
                    if (window.innerWidth < 768) dotSize *= 0.85; 
                    
                    let alpha = 0.35;
                    if (normD > 0.7) { alpha = 0.35 * (1.0 - (normD - 0.7) / 0.3); }
                    if (normD < 0.1) { alpha *= (normD / 0.1); }

                    ctx.fillStyle = `hsla(${baseHue + 10}, 50%, 88%, ${alpha})`;
                    ctx.fillRect(ptX - dotSize / 2, ptY - dotSize / 2, dotSize, dotSize);
                }
            }

            // 3. Physique & Rendu cinétique des étincelles (Accrétion + Éjection Feu d'Artifice)
            ctx.globalCompositeOperation = 'lighter'; 
            for (let i = sparks.length - 1; i >= 0; i--) {
                const p = sparks[i];
                
                const dx = p.x - coreX;
                const dy = p.y - coreY;
                const dist = Math.hypot(dx, dy);
                
                if (dist > 10) {
                    // Les particules de type feu d'artifice subissent une gravité atténuée (15%) pour permettre l'éjection
                    const gravityFactor = p.isFirework ? 0.15 : 1.0;
                    const pull = ((0.04 + smoothBass * 0.08) / (dist * 0.008)) * gravityFactor;
                    p.vx -= (dx / dist) * pull;
                    p.vy -= (dy / dist) * pull;
                }
                
                // Intégration cinétique et ajout de turbulences corrélées aux médiums
                p.x += p.vx + (Math.sin(p.y * 0.04 + time) * 0.15 * smoothMid);
                p.y += p.vy + (Math.cos(p.x * 0.04 + time) * 0.15 * smoothMid);
                
                p.vx *= p.friction; 
                p.vy *= p.friction;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    sparks.splice(i, 1);
                    continue;
                }

                ctx.fillStyle = `hsla(${p.hue}, 100%, 82%, ${p.alpha})`;
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                
                if (p.size > 1.1) {
                    ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${p.alpha * 0.25})`;
                    ctx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
                }
            }
            
            ctx.globalCompositeOperation = 'source-over'; 

            // 4. Anneaux d'accrétion énergétiques
            const ringCount = window.innerWidth < 768 ? 3 : 5;
            const ringTime = time * 1.8;
            for (let j = 0; j < ringCount; j++) {
                const ringRadius = holeRadius * (1.05 + j * 0.05);
                const ringPoints = 64;
                ctx.beginPath();
                for (let i = 0; i <= ringPoints; i++) {
                    const angle = (i / ringPoints) * Math.PI * 2;
                    const warp = Math.sin(angle * (3 + j) + ringTime) * (5 + smoothBass * 18) + Math.cos(angle * 2 - ringTime * 0.8) * (3 + smoothHigh * 8);
                    const r = ringRadius + warp;
                    const x = coreX + Math.cos(angle) * r;
                    const y = coreY + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                const ringHue = (baseHue + j * 10) % 360;
                const ringAlpha = (0.45 - j * 0.09) * (0.6 + smoothBass * 0.4);
                ctx.strokeStyle = `hsla(${ringHue}, 95%, 65%, ${Math.max(0, ringAlpha)})`;
                ctx.lineWidth = 1.5 + smoothBass * 2.5;
                ctx.stroke();
            }

            // 5. Distorsion gravitationnelle & Singularité
            const lensingGrad = ctx.createRadialGradient(coreX, coreY, holeRadius, coreX, coreY, holeRadius * 1.25);
            lensingGrad.addColorStop(0, 'rgba(0, 0, 0, 1.0)');
            lensingGrad.addColorStop(0.4, 'rgba(0, 0, 0, 0.85)');
            lensingGrad.addColorStop(1, 'rgba(0, 0, 0, 0.0)');
            ctx.fillStyle = lensingGrad;
            ctx.beginPath();
            ctx.arc(coreX, coreY, holeRadius * 1.25, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(coreX, coreY, holeRadius, 0, Math.PI * 2);
            ctx.fill();
        }
    </script>
