<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expérience Sonore Nocturne - Black Hole Core</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            touch-action: none;
            overscroll-behavior: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            z-index: 20;
            transition: opacity 0.8s ease;
            cursor: pointer;
            padding: 20px;
        }
        #ui-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        #status-text {
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        #sub-status-text {
            font-size: 0.75rem;
            color: #a0b0d0;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Panneau de contrôle */
        #controls-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(4, 4, 8, 0.4);
            padding: 12px 16px;
            border-radius: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: 320px;
            user-select: none;
            transition: opacity 0.3s ease, background-color 0.3s ease, transform 0.3s ease;
            opacity: 0.2; 
        }
        
        @media (pointer: fine) {
            #controls-container:hover {
                opacity: 1;
                background: rgba(4, 4, 8, 0.75);
            }
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #play-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        #play-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 1);
        }
        #play-btn:hover svg {
            fill: #000000;
        }
        #play-btn svg {
            width: 12px;
            height: 12px;
            fill: #ffffff;
            transition: fill 0.2s ease;
        }
        
        .progress-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            color: #8a9bb4;
            font-variant-numeric: tabular-nums;
        }
        .slider-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 0 6px rgba(255,255,255,0.5);
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            width: 100%;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        .rhythm-column {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
        }
        .rhythm-column label {
            font-size: 0.6rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #a0b0d0;
        }
        .rhythm-label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #sens-val {
            font-size: 0.65rem;
            font-weight: 600;
            color: #ffffff;
        }



        #fx-hud {
            position: absolute;
            top: 18px;
            left: 18px;
            z-index: 12;
            padding: 10px 14px;
            border-radius: 14px;
            background: rgba(4, 4, 8, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.62rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
            opacity: 0.0;
            transform: translateY(-6px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        #fx-hud.visible {
            opacity: 1.0;
            transform: translateY(0);
        }
        #fx-hud strong {
            color: #ffffff;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            #controls-container {
                width: calc(100% - 32px);
                left: 16px;
                bottom: 16px;
                opacity: 0.90; 
                background: rgba(6, 6, 12, 0.75);
                padding: 14px 16px;
                gap: 12px;
            }
            #play-btn {
                width: 38px;
                height: 38px;
            }
            input[type="range"] {
                height: 4px; 
            }
            input[type="range"]::-webkit-slider-thumb {
                width: 14px;
                height: 14px;
            }
            #status-text {
                font-size: 0.8rem;
            }
            #sub-status-text {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="visualizer"></canvas>

    <div id="project-branding">L0fxArt</div>

    <style>
        #project-branding {
            position: absolute;
            top: 95%;
            left: 95%;
            transform: translate(-70%, -70%);
            font-family: 'Segoe UI', sans-serif;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.15); 
            pointer-events: none; 
            z-index: 5;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.25); 
            user-select: none;
            white-space: nowrap;
        }
    </style>

    <div id="fx-hud">FX : <strong>Libre</strong></div>

    <div id="ui-overlay" onclick="startExperience()">
        <div id="status-text">CLIQUEZ POUR LANCER L'EXPÉRIENCE</div>
        <div id="sub-status-text">Audio intégré : BlackHoleCore</div>
    </div>

    <div id="controls-container">
        <div class="player-row">
            <button id="play-btn" title="Lecture / Pause">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div class="progress-container">
                <div class="slider-wrapper">
                    <input type="range" id="progress-slider" min="0" max="100" value="0">
                </div>
                <div class="time-labels">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        window.addEventListener('error', (event) => {
            console.error('Erreur JavaScript LofXArt :', event.message, event.filename, event.lineno);
            const sub = document.getElementById('sub-status-text');
            const overlay = document.getElementById('ui-overlay');
            if (sub && overlay && !overlay.classList.contains('fade-out')) {
                sub.innerText = 'Erreur de lancement : rechargez la page ou vérifiez la console.';
            }
        });

        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const uiOverlay = document.getElementById('ui-overlay');
        const fxHud = document.getElementById('fx-hud');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressSlider = document.getElementById('progress-slider');
        const currentTimeLabel = document.getElementById('current-time');
        const totalTimeLabel = document.getElementById('total-time');
        const AUDIO_FILE_PATH = "audio/BlackHoleCore.mp3";

        let audioCtx;
        let analyser;
        let dataArray;
        let isSetup = false;
        
        let useBufferMode = false;
        let audioBuffer = null;
        let bufferSourceNode = null;
        let localAudioElement = null;

        
        let mediaSourceNode = null;
        let dryGain = null;
        let flangerDelay = null;
        let flangerFeedback = null;
        let flangerWetGain = null;
        let flangerLfo = null;
        let flangerLfoGain = null;
        let phaserFilters = [];
        let phaserWetGain = null;
        let phaserDelay = null;
        let phaserDelayFeedback = null;
        let phaserDelayWetGain = null;
        let horizontalSweepFilter = null;
        let horizontalSweepWetGain = null;
        let verticalWaveDelay = null;
        let verticalWaveFeedback = null;
        let verticalWaveWetGain = null;
        let reverbConvolver = null;
        let reverbWetGain = null;
        let tapDelay = null;
        let tapDelayFeedback = null;
        let tapDelayWetGain = null;
        let bitcrusherNode = null;
        let bitcrusherWetGain = null;

        
        let fxVertical = 0;
        let fxHorizontal = 0;
        let fxHorizontalAlt = 0;
        let fxVerticalWave = 0;
        let fxDiagonal = 0;
        let fxSpeed = 0; 
        let fxGlitch = 0;
        let fxFlash = 0;
        let fxTapEcho = 0;
        let fxIsHeld = false;
        let fxLabelTimeout = null;

        let startTime = 0;
        let pausedTime = 0;
        let isPlaying = false;

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let targetMX = window.innerWidth / 2;
        let targetMY = window.innerHeight / 2;
        const mouseEasing = 0.04;

        let pointerActive = false;
        let lastPointerX = window.innerWidth / 2;
        let lastPointerY = window.innerHeight / 2;
        let gestureStartX = window.innerWidth / 2;
        let gestureStartY = window.innerHeight / 2;
        let lastPointerTime = performance.now();
        let activeTouchId = null;
        let lastTouchEventTime = 0;
        let gestureMoved = false;
        let lastTapFxTime = 0;
        let tapStartTime = 0;

        let smoothBass = 0;
        let smoothMid = 0;
        let smoothHigh = 0;

        let sparks = [];
        let energyWaves = [];
        let baseHue = 215; 
        let targetHue = 215;

        const colorPalette = [215, 290, 340, 25, 150, 45]; 

        let totalRays = 85;     
        let dotsPerRay = 40;     

        let hoverWaveTime = 0;
        let hoverIntensity = 0;

       
        let bhRotation = 0;
        let bhOrbital = [0, Math.PI * 0.60, Math.PI * 1.35];
        let bhPulse = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            targetMX = window.innerWidth / 2;
            targetMY = window.innerHeight / 2;

            if (window.innerWidth < 768) {
                totalRays = 50;     
                dotsPerRay = 25;     
            } else {
                totalRays = 85;     
                dotsPerRay = 40;     
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('mousemove', (e) => {
            targetMX = e.clientX;
            targetMY = e.clientY;
        });

        function getActiveTouch(e) {
            if (activeTouchId === null) return e.touches[0] || e.changedTouches[0] || null;

            for (let i = 0; i < e.touches.length; i++) {
                if (e.touches[i].identifier === activeTouchId) return e.touches[i];
            }
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === activeTouchId) return e.changedTouches[i];
            }
            return e.touches[0] || e.changedTouches[0] || null;
        }

        canvas.addEventListener('touchstart', (e) => {
            if (e.cancelable) e.preventDefault();
            if (!e.touches.length) return;

            const t = e.touches[0];
            activeTouchId = t.identifier;
            lastTouchEventTime = performance.now();
            tapStartTime = lastTouchEventTime;
            targetMX = t.clientX;
            targetMY = t.clientY;
            beginPointerInteraction(t.clientX, t.clientY);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (e.cancelable) e.preventDefault();
            const t = getActiveTouch(e);
            if (!t) return;

            lastTouchEventTime = performance.now();
            targetMX = t.clientX;
            targetMY = t.clientY;
            if (pointerActive) handleGestureMove(t.clientX, t.clientY, true);
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (e.cancelable) e.preventDefault();

            const now = performance.now();
            const t = getActiveTouch(e);
            const tapDuration = now - tapStartTime;
            const totalDistance = Math.hypot(lastPointerX - gestureStartX, lastPointerY - gestureStartY);

            lastTouchEventTime = now;
            activeTouchId = null;

          
            if (!gestureMoved && totalDistance < 9 && tapDuration < 420) {
                const tapX = t ? t.clientX : lastPointerX;
                const tapY = t ? t.clientY : lastPointerY;
                triggerTapFx(tapX, tapY);
            }

            endPointerInteraction();
        }, { passive: false });

        canvas.addEventListener('touchcancel', (e) => {
            if (e.cancelable) e.preventDefault();
            lastTouchEventTime = performance.now();
            activeTouchId = null;
            endPointerInteraction();
        }, { passive: false });

        window.addEventListener('pointerdown', (e) => {
            
            if (performance.now() - lastTouchEventTime < 700) return;
            beginPointerInteraction(e.clientX, e.clientY);
        }, { passive: true });

        window.addEventListener('pointermove', (e) => {
            if (performance.now() - lastTouchEventTime < 700) return;
            targetMX = e.clientX;
            targetMY = e.clientY;
            if (pointerActive) handleGestureMove(e.clientX, e.clientY, false);
        }, { passive: true });

        window.addEventListener('pointerup', () => {
            if (performance.now() - lastTouchEventTime < 700) return;
            endPointerInteraction();
        }, { passive: true });

        window.addEventListener('pointercancel', () => {
            if (performance.now() - lastTouchEventTime < 700) return;
            endPointerInteraction();
        }, { passive: true });

        function triggerTapFx(x, y) {
            if (!isSetup) return;

            const now = performance.now();
           
            if (now - lastTapFxTime < 180) return;
            lastTapFxTime = now;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            const currentIndex = colorPalette.indexOf(targetHue);
            const nextIndex = (currentIndex + 1) % colorPalette.length;
            targetHue = colorPalette[nextIndex];

            const burstCount = window.innerWidth < 768 ? 38 : 82; 
            const minScreenDim = Math.min(canvas.width, canvas.height);
            const currentHoleRadius = minScreenDim * 0.16;

          
            energyWaves.push({
                radius: currentHoleRadius * 0.82,
                alpha: 0.36,
                width: 30,
                hue: targetHue,
                speed: Math.max(5.5, minScreenDim * 0.013)
            });

            
            fxTapEcho = Math.min(1.0, fxTapEcho + 1.0);
            showFxLabel('Echo Delay');

            for (let i = 0; i < burstCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const isFirework = Math.random() < 0.42; 

                const radialSpeed = isFirework ? (2.3 + Math.random() * 4.2) : (0.8 + Math.random() * 1.8); 
                const swirlSpeed = isFirework ? ((Math.random() - 0.5) * 1.0) : ((1.4 + Math.random() * 2.8) * (Math.random() > 0.5 ? 1 : -1));

                sparks.push({
                    x: centerX + Math.cos(angle) * currentHoleRadius,
                    y: centerY + Math.sin(angle) * currentHoleRadius,
                    vx: Math.cos(angle) * radialSpeed - Math.sin(angle) * swirlSpeed,
                    vy: Math.sin(angle) * radialSpeed + Math.cos(angle) * swirlSpeed,
                    alpha: 0.82,
                    decay: isFirework ? (0.009 + Math.random() * 0.010) : (0.011 + Math.random() * 0.012), 
                    size: isFirework ? (0.5 + Math.random() * 1.0) : (0.4 + Math.random() * 0.9), 
                    hue: targetHue + (Math.random() - 0.5) * (isFirework ? 42 : 24),
                    isFirework: isFirework,
                    friction: isFirework ? 0.982 : 0.97
                });
            }
        }

        
        canvas.addEventListener('click', (e) => {
            if (!isSetup) return;

           
            if (performance.now() - lastTouchEventTime < 900) return;

            triggerTapFx(e.clientX, e.clientY);
        });




        function showFxLabel(label) {
            if (!fxHud) return;
            fxHud.innerHTML = `FX : <strong>${label}</strong>`;
            fxHud.classList.add('visible');
            if (fxLabelTimeout) clearTimeout(fxLabelTimeout);
            fxLabelTimeout = setTimeout(() => fxHud.classList.remove('visible'), 900);
        }

        function createImpulseResponse(context, duration = 2.2, decay = 2.4) {
            const rate = context.sampleRate;
            const length = Math.floor(rate * duration);
            const impulse = context.createBuffer(2, length, rate);
            for (let channel = 0; channel < 2; channel++) {
                const data = impulse.getChannelData(channel);
                for (let i = 0; i < length; i++) {
                    const t = i / length;
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay);
                }
            }
            return impulse;
        }

        function createBitcrusher(context, bits = 5, normfreq = 0.18) {
            const node = context.createScriptProcessor(1024, 1, 1);
            let phaser = 0;
            let last = 0;
            const step = Math.pow(0.5, bits);

            node.onaudioprocess = function(event) {
                const input = event.inputBuffer.getChannelData(0);
                const output = event.outputBuffer.getChannelData(0);
                for (let i = 0; i < input.length; i++) {
                    phaser += normfreq;
                    if (phaser >= 1.0) {
                        phaser -= 1.0;
                        last = step * Math.floor(input[i] / step + 0.5);
                    }
                    output[i] = last;
                }
            };
            return node;
        }

        function setupAudioFxChain(sourceNode) {
            dryGain = audioCtx.createGain();
            dryGain.gain.value = 0.82;

            flangerDelay = audioCtx.createDelay(0.04);
            flangerDelay.delayTime.value = 0.005;
            flangerFeedback = audioCtx.createGain();
            flangerFeedback.gain.value = 0.0;
            flangerWetGain = audioCtx.createGain();
            flangerWetGain.gain.value = 0.0;
            flangerLfo = audioCtx.createOscillator();
            flangerLfo.frequency.value = 0.22;
            flangerLfoGain = audioCtx.createGain();
            flangerLfoGain.gain.value = 0.001;
            flangerLfo.connect(flangerLfoGain);
            flangerLfoGain.connect(flangerDelay.delayTime);
            flangerLfo.start();

            phaserFilters = [];
            let previousPhaserNode = null;
            for (let i = 0; i < 8; i++) {
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'allpass';
                filter.frequency.value = 180 + i * 280;
                filter.Q.value = 1.4;
                phaserFilters.push(filter);
                if (previousPhaserNode) previousPhaserNode.connect(filter);
                previousPhaserNode = filter;
            }
            phaserWetGain = audioCtx.createGain();
            phaserWetGain.gain.value = 0.0;

           
            phaserDelay = audioCtx.createDelay(0.9);
            phaserDelay.delayTime.value = 0.18;
            phaserDelayFeedback = audioCtx.createGain();
            phaserDelayFeedback.gain.value = 0.0;
            phaserDelayWetGain = audioCtx.createGain();
            phaserDelayWetGain.gain.value = 0.0;

           
            horizontalSweepFilter = audioCtx.createBiquadFilter();
            horizontalSweepFilter.type = 'bandpass';
            horizontalSweepFilter.frequency.value = 780;
            horizontalSweepFilter.Q.value = 5.0;
            horizontalSweepWetGain = audioCtx.createGain();
            horizontalSweepWetGain.gain.value = 0.0;

           
            verticalWaveDelay = audioCtx.createDelay(0.55);
            verticalWaveDelay.delayTime.value = 0.075;
            verticalWaveFeedback = audioCtx.createGain();
            verticalWaveFeedback.gain.value = 0.0;
            verticalWaveWetGain = audioCtx.createGain();
            verticalWaveWetGain.gain.value = 0.0;

            reverbConvolver = audioCtx.createConvolver();
            reverbConvolver.buffer = createImpulseResponse(audioCtx, 3.4, 1.75);
            reverbWetGain = audioCtx.createGain();
            reverbWetGain.gain.value = 0.0;

            
            tapDelay = audioCtx.createDelay(1.2);
            tapDelay.delayTime.value = 0.34;
            tapDelayFeedback = audioCtx.createGain();
            tapDelayFeedback.gain.value = 0.42;
            tapDelayWetGain = audioCtx.createGain();
            tapDelayWetGain.gain.value = 0.0;

            bitcrusherNode = createBitcrusher(audioCtx, 5, 0.16);
            bitcrusherWetGain = audioCtx.createGain();
            bitcrusherWetGain.gain.value = 0.0;

            sourceNode.connect(dryGain);
            dryGain.connect(analyser);

            sourceNode.connect(flangerDelay);
            flangerDelay.connect(flangerFeedback);
            flangerFeedback.connect(flangerDelay);
            flangerDelay.connect(flangerWetGain);
            flangerWetGain.connect(analyser);

            sourceNode.connect(phaserFilters[0]);
            phaserFilters[phaserFilters.length - 1].connect(phaserWetGain);
            phaserWetGain.connect(analyser);

            sourceNode.connect(phaserDelay);
            phaserDelay.connect(phaserDelayFeedback);
            phaserDelayFeedback.connect(phaserDelay);
            phaserDelay.connect(phaserDelayWetGain);
            phaserDelayWetGain.connect(analyser);

            sourceNode.connect(horizontalSweepFilter);
            horizontalSweepFilter.connect(horizontalSweepWetGain);
            horizontalSweepWetGain.connect(analyser);

            sourceNode.connect(verticalWaveDelay);
            verticalWaveDelay.connect(verticalWaveFeedback);
            verticalWaveFeedback.connect(verticalWaveDelay);
            verticalWaveDelay.connect(verticalWaveWetGain);
            verticalWaveWetGain.connect(analyser);

            sourceNode.connect(reverbConvolver);
            reverbConvolver.connect(reverbWetGain);
            reverbWetGain.connect(analyser);

            sourceNode.connect(tapDelay);
            tapDelay.connect(tapDelayFeedback);
            tapDelayFeedback.connect(tapDelay);
            tapDelay.connect(tapDelayWetGain);
            tapDelayWetGain.connect(analyser);

            sourceNode.connect(bitcrusherNode);
            bitcrusherNode.connect(bitcrusherWetGain);
            bitcrusherWetGain.connect(analyser);

            analyser.connect(audioCtx.destination);
        }

        function updateAudioFx() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const activeFx = Math.max(
                fxVertical, fxVerticalWave, fxHorizontal, fxHorizontalAlt,
                fxDiagonal, Math.abs(fxSpeed), fxGlitch, fxTapEcho
            );

            
            if (dryGain) dryGain.gain.setTargetAtTime(0.86 - activeFx * 0.30, now, 0.035);

            
            if (flangerWetGain) flangerWetGain.gain.setTargetAtTime(1.18 * fxVertical, now, 0.022);
            if (flangerFeedback) flangerFeedback.gain.setTargetAtTime(0.74 * fxVertical, now, 0.022);
            if (flangerLfoGain) flangerLfoGain.gain.setTargetAtTime(0.001 + 0.016 * fxVertical, now, 0.022);
            if (flangerLfo) flangerLfo.frequency.setTargetAtTime(0.35 + 5.2 * fxVertical, now, 0.022);

            
            if (verticalWaveWetGain) verticalWaveWetGain.gain.setTargetAtTime(0.86 * fxVerticalWave, now, 0.035);
            if (verticalWaveFeedback) verticalWaveFeedback.gain.setTargetAtTime(0.18 + 0.52 * fxVerticalWave, now, 0.04);
            if (verticalWaveDelay) {
                const waveDelay = 0.045 + 0.07 * (0.5 + 0.5 * Math.sin(performance.now() * 0.006));
                verticalWaveDelay.delayTime.setTargetAtTime(waveDelay, now, 0.035);
            }

            
            if (phaserWetGain) phaserWetGain.gain.setTargetAtTime(1.28 * fxHorizontal, now, 0.026);
            if (phaserDelayWetGain) phaserDelayWetGain.gain.setTargetAtTime(0.62 * fxHorizontal, now, 0.035);
            if (phaserDelayFeedback) phaserDelayFeedback.gain.setTargetAtTime(0.14 + 0.56 * fxHorizontal, now, 0.035);
            if (phaserDelay) phaserDelay.delayTime.setTargetAtTime(0.08 + 0.26 * fxHorizontal, now, 0.04);
            if (reverbWetGain) reverbWetGain.gain.setTargetAtTime(0.88 * fxHorizontal + 0.48 * fxHorizontalAlt, now, 0.055);

            if (phaserFilters.length) {
                phaserFilters.forEach((filter, index) => {
                    const sweep = Math.sin(performance.now() * 0.010 + index * 0.62);
                    const freq = 140 + index * 300 + fxHorizontal * 4200 + sweep * 880 * fxHorizontal;
                    filter.frequency.setTargetAtTime(freq, now, 0.026);
                    filter.Q.setTargetAtTime(1.4 + fxHorizontal * 9.0, now, 0.028);
                });
            }

            
            if (horizontalSweepWetGain) horizontalSweepWetGain.gain.setTargetAtTime(0.98 * fxHorizontalAlt, now, 0.03);
            if (horizontalSweepFilter) {
                const sweep = 520 + 3600 * (0.5 + 0.5 * Math.sin(performance.now() * 0.007));
                horizontalSweepFilter.frequency.setTargetAtTime(sweep, now, 0.035);
                horizontalSweepFilter.Q.setTargetAtTime(2.5 + fxHorizontalAlt * 12.0, now, 0.035);
            }

            if (tapDelayWetGain) tapDelayWetGain.gain.setTargetAtTime(0.82 * fxTapEcho, now, 0.025);
            if (tapDelayFeedback) tapDelayFeedback.gain.setTargetAtTime(0.30 + 0.34 * fxTapEcho, now, 0.05);

            if (bitcrusherWetGain) bitcrusherWetGain.gain.setTargetAtTime(0.70 * fxGlitch, now, 0.018);

            if (localAudioElement) {
                
                const targetRate = Math.max(0.42, Math.min(1.75, 1.0 + fxSpeed * 0.68 + fxGlitch * 0.06));
                localAudioElement.playbackRate += (targetRate - localAudioElement.playbackRate) * 0.24;
            }
        }

        function triggerGlitch() {
            fxGlitch = Math.min(1.0, fxGlitch + 0.78);
            fxFlash = Math.min(0.38, fxFlash + 0.24);
            showFxLabel('Glitch');
        }

        function spawnElectricDust(x, y, count, hueBase) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.7 + Math.random() * 2.2;
                sparks.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    alpha: 0.85,
                    decay: 0.015 + Math.random() * 0.018,
                    size: 0.5 + Math.random() * 1.2,
                    hue: hueBase + (Math.random() - 0.5) * 35,
                    isFirework: true,
                    friction: 0.965
                });
            }
        }

        function handleGestureMove(x, y, isTouch = false) {
            if (!isSetup) return;

            const now = performance.now();
            const dt = Math.max(16, now - lastPointerTime);

            const dx = x - lastPointerX;
            const dy = y - lastPointerY;
            const totalDx = x - gestureStartX;
            const totalDy = y - gestureStartY;

            const distance = Math.hypot(dx, dy);
            const totalDistance = Math.hypot(totalDx, totalDy);
            const speed = distance / dt;

            if (totalDistance > (isTouch ? 11 : 7)) gestureMoved = true;

            const absX = Math.abs(dx);
            const absY = Math.abs(dy);
            const totalAbsX = Math.abs(totalDx);
            const totalAbsY = Math.abs(totalDy);


            const minMove = isTouch ? 4 : 8;
            const minDiagonal = isTouch ? 6 : 10;
            const intensity = Math.min(1.0, Math.max(distance, totalDistance * 0.18) / (isTouch ? 14 : 22));

            if (speed > (isTouch ? 1.35 : 1.65) && distance > (isTouch ? 16 : 24)) triggerGlitch();


            const diagonalRatio = Math.min(totalAbsX, totalAbsY) / Math.max(totalAbsX || 1, totalAbsY || 1);
            const isDiagonal = totalDistance > minDiagonal && totalAbsX > minMove && totalAbsY > minMove && diagonalRatio > (isTouch ? 0.22 : 0.34);

            if (isDiagonal) {
                fxDiagonal = Math.min(1.0, Math.max(fxDiagonal, 0.58) + intensity * 0.86);

                // TotalDy > 0 = diagonale vers le bas = slow down.
                const direction = totalDy < 0 ? 1 : -1;
                fxSpeed += direction * intensity * (isTouch ? 0.92 : 0.72);
                fxSpeed = Math.max(-1.0, Math.min(1.0, fxSpeed));

                if (direction > 0) {
                    showFxLabel('Speed Up');
                    spawnElectricDust(x, y, 8 + Math.floor(intensity * 12), 35);
                } else {
                    showFxLabel('Slow Down');
                    spawnElectricDust(x, y, 9 + Math.floor(intensity * 13), 185);
                }
            } else if (totalAbsX > totalAbsY * (isTouch ? 1.05 : 1.25) && totalAbsX > minMove) {
                if (totalDx > 0) {
                    fxHorizontal = Math.min(1.0, Math.max(fxHorizontal, 0.72) + intensity * 0.88);
                    fxHorizontalAlt *= 0.72;
                    showFxLabel('Phaser + Reverb');
                    spawnElectricDust(x, y, 6 + Math.floor(intensity * 9), targetHue + 35);
                } else {
                    fxHorizontalAlt = Math.min(1.0, Math.max(fxHorizontalAlt, 0.68) + intensity * 0.88);
                    fxHorizontal *= 0.76;
                    showFxLabel('Sweep Spatial');
                    spawnElectricDust(x, y, 6 + Math.floor(intensity * 9), 275);
                }
            } else if (totalAbsY > totalAbsX * (isTouch ? 1.05 : 1.25) && totalAbsY > minMove) {
                if (totalDy < 0) {
                    fxVertical = Math.min(1.0, Math.max(fxVertical, 0.56) + intensity * 0.86);
                    fxVerticalWave *= 0.70;
                    showFxLabel('Flanger électrique');
                    spawnElectricDust(x, y, 8 + Math.floor(intensity * 11), 205);
                } else {
                    fxVerticalWave = Math.min(1.0, Math.max(fxVerticalWave, 0.62) + intensity * 0.90);
                    fxVertical *= 0.74;
                    showFxLabel('Vague sonore');
                    spawnElectricDust(x, y, 8 + Math.floor(intensity * 11), 165);
                }
            }

            lastPointerX = x;
            lastPointerY = y;
            lastPointerTime = now;
        }

        function beginPointerInteraction(x, y) {
            pointerActive = true;
            fxIsHeld = true;
            gestureMoved = false;
            gestureStartX = x;
            gestureStartY = y;
            lastPointerX = x;
            lastPointerY = y;
            lastPointerTime = performance.now();
        }

        function endPointerInteraction() {
            pointerActive = false;
            fxIsHeld = false;
            if (gestureMoved) showFxLabel('Retour naturel');
        }

        async function startExperience() {
            if (isSetup) return;

            uiOverlay.classList.add('fade-out');
            initAudioContext();
            animate();
            isSetup = true;

            await loadAndPlayIntegratedAudio();
        }

        function initAudioContext() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 1024;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            playBtn.addEventListener('click', togglePlay);
            progressSlider.addEventListener('input', seekAudio);
        }

        async function loadAndPlayIntegratedAudio() {
            try {
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                localAudioElement = new Audio(AUDIO_FILE_PATH);
                localAudioElement.preload = "auto";
                localAudioElement.playsInline = true;
                localAudioElement.volume = 1.0;


                localAudioElement.preservesPitch = false;
                localAudioElement.mozPreservesPitch = false;
                localAudioElement.webkitPreservesPitch = false;

                localAudioElement.addEventListener('timeupdate', () => {
                    if (!useBufferMode) updateProgressUI(localAudioElement.currentTime, localAudioElement.duration);
                });

                localAudioElement.addEventListener('loadedmetadata', () => {
                    if (!useBufferMode) totalTimeLabel.innerText = formatTime(localAudioElement.duration);
                });

                localAudioElement.addEventListener('ended', () => {
                    isPlaying = false;
                    updatePlayerIcons();
                });

                localAudioElement.addEventListener('error', () => {
                    console.error("Fichier audio introuvable ou illisible :", AUDIO_FILE_PATH);
                    document.getElementById('sub-status-text').innerText = "Erreur : audio introuvable dans /audio/";
                });

                mediaSourceNode = audioCtx.createMediaElementSource(localAudioElement);
                setupAudioFxChain(mediaSourceNode);

                await localAudioElement.play();

                isPlaying = true;
                useBufferMode = false;
                updatePlayerIcons();
            } catch (err) {
                console.error("Lecture audio impossible depuis le chemin intégré :", AUDIO_FILE_PATH, err);
                document.getElementById('sub-status-text').innerText =
                    "Erreur audio : vérifiez le fichier audio/down-now-Remix.mp3";
                isPlaying = false;
                updatePlayerIcons();
            }
        }

        function playBuffer(timeOffset) {
            if (bufferSourceNode) {
                try { bufferSourceNode.stop(); } catch(e){}
            }
            bufferSourceNode = audioCtx.createBufferSource();
            bufferSourceNode.buffer = audioBuffer;
            bufferSourceNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            startTime = audioCtx.currentTime - timeOffset;
            bufferSourceNode.start(0, timeOffset);
            isPlaying = true;
            updatePlayerIcons();
            
            bufferSourceNode.onended = () => {
                if (isPlaying && (audioCtx.currentTime - startTime) >= audioBuffer.duration) {
                    isPlaying = false;
                    pausedTime = 0;
                    updatePlayerIcons();
                }
            };
        }

        async function togglePlay() {
            if (audioCtx && audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            if (useBufferMode) {
                if (isPlaying) {
                    pausedTime = audioCtx.currentTime - startTime;
                    if (bufferSourceNode) bufferSourceNode.stop();
                    isPlaying = false;
                } else {
                    if (pausedTime >= audioBuffer.duration) pausedTime = 0;
                    playBuffer(pausedTime);
                }
                updatePlayerIcons();
            } else {
                if (!localAudioElement) return;

                if (localAudioElement.paused) {
                    localAudioElement.play().then(() => {
                        isPlaying = true;
                        updatePlayerIcons();
                    }).catch(err => {
                        console.error("Impossible de relancer l'audio :", err);
                        isPlaying = false;
                        updatePlayerIcons();
                    });
                } else {
                    localAudioElement.pause();
                    isPlaying = false;
                    updatePlayerIcons();
                }
            }
        }

        function seekAudio() {
            if (useBufferMode && audioBuffer) {
                const targetTime = (progressSlider.value / 100) * audioBuffer.duration;
                if (isPlaying) { playBuffer(targetTime); }
                else { pausedTime = targetTime; }
                currentTimeLabel.innerText = formatTime(targetTime);
            } else if (localAudioElement && !isNaN(localAudioElement.duration)) {
                const targetTime = (progressSlider.value / 100) * localAudioElement.duration;
                localAudioElement.currentTime = targetTime;
            }
        }

        function updateProgressUI(current, duration) {
            if (!isNaN(duration) && duration > 0) {
                const pct = (current / duration) * 100;
                progressSlider.value = pct;
                currentTimeLabel.innerText = formatTime(current);
            }
        }

        function updatePlayerIcons() {
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        function formatTime(secs) {
            if (isNaN(secs) || secs < 0) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            baseHue += (targetHue - baseHue) * 0.05;
            mouseX += (targetMX - mouseX) * mouseEasing;
            mouseY += (targetMY - mouseY) * mouseEasing;

            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let bass = 0;
            let mid = 0;
            let high = 0;

            if (isPlaying && analyser) {
                analyser.getByteFrequencyData(dataArray);
                const k = dataArray.length;
                
                const bassEnd = Math.floor(k * 0.08);
                const midEnd = Math.floor(k * 0.45);

                for (let i = 0; i < bassEnd; i++) { bass += dataArray[i]; }
                for (let i = bassEnd; i < midEnd; i++) { mid += dataArray[i]; }
                for (let i = midEnd; i < k; i++) { high += dataArray[i]; }

                bass = (bass / bassEnd) / 255;
                mid = (mid / (midEnd - bassEnd)) / 255;
                high = (high / (k - midEnd)) / 255;
            }

            smoothBass += (bass - smoothBass) * 0.22;
            smoothMid += (mid - smoothMid) * 0.16;
            smoothHigh += (high - smoothHigh) * 0.16;

            if (fxIsHeld) {
                
                fxVertical *= 0.992;
                fxVerticalWave *= 0.992;
                fxHorizontal *= 0.994;
                fxHorizontalAlt *= 0.994;
                fxDiagonal *= 0.990;
                fxSpeed *= 0.994;
            } else {
               
                fxVertical *= 0.88;
                fxVerticalWave *= 0.88;
                fxHorizontal *= 0.88;
                fxHorizontalAlt *= 0.88;
                fxDiagonal *= 0.86;
                fxSpeed *= 0.80;
            }
            fxGlitch *= 0.70;
            fxFlash *= 0.74;
            fxTapEcho *= 0.965;
            updateAudioFx();

           
            bhPulse += (smoothBass * 0.8 + smoothMid * 0.2 - bhPulse) * 0.15;
            bhRotation += 0.0018 + smoothBass * 0.007 + fxDiagonal * 0.004;
            bhOrbital[0] += 0.0055 + smoothBass * 0.010;
            bhOrbital[1] -= 0.0038 + smoothMid * 0.007;
            bhOrbital[2] += 0.0082 + smoothHigh * 0.012;

            const time = performance.now() * 0.001 * (1.0 + smoothBass * 0.4 + Math.abs(fxSpeed) * 0.62 + fxDiagonal * 0.16 + fxVerticalWave * 0.22);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const minScreenDim = Math.min(canvas.width, canvas.height);
            
            const centralPulse = smoothBass * (minScreenDim * 0.08);
            const holeRadius = minScreenDim * 0.16 + centralPulse;
            const glowRadius = minScreenDim * 0.42 + (smoothBass * 0.15 + smoothMid * 0.20 + fxHorizontal * 0.42 + fxHorizontalAlt * 0.30 + fxVerticalWave * 0.18) * minScreenDim;
            
            const viewOffsetX = (centerX - mouseX);
            const viewOffsetY = (centerY - mouseY);

            const kineticCenterX = centerX;
            const kineticCenterY = centerY;

            const coreX = kineticCenterX + viewOffsetX * 0.02;
            const coreY = kineticCenterY + viewOffsetY * 0.02;

            const distToCore = Math.hypot(targetMX - coreX, targetMY - coreY);
            const isHoveringCore = isSetup && (distToCore < holeRadius);
            
            if (isHoveringCore) {
                hoverIntensity += (1.0 - hoverIntensity) * 0.12;
                hoverWaveTime += 0.08;
            } else {
                hoverIntensity += (0.0 - hoverIntensity) * 0.06;
            }

            
            if (smoothBass > 0.15) {
                const sparkCount = Math.floor((smoothBass + fxVertical * 0.12 + fxDiagonal * 0.08) * (window.innerWidth < 768 ? 3 : 6)); 
                for (let k = 0; k < sparkCount; k++) {
                    const angle = Math.random() * Math.PI * 2;
                    
                    
                    const isFirework = Math.random() < 0.25; 
                    
                    let radialSpeed, swirlSpeed, decay, friction;
                    if (isFirework) {
                        radialSpeed = 3.0 + smoothBass * 4.5; 
                        swirlSpeed = (Math.random() - 0.5) * 1.0;  
                        decay = 0.005 + Math.random() * 0.007;     
                        friction = 0.985;                          
                    } else {
                        radialSpeed = 0.3 + smoothBass * 1.2;
                        swirlSpeed = (1.2 + smoothMid * 3.5) * (Math.random() > 0.5 ? 1 : -1);
                        decay = 0.004 + Math.random() * 0.008;
                        friction = 0.975;
                    }
                    
                    sparks.push({
                        x: kineticCenterX + Math.cos(angle) * holeRadius,
                        y: kineticCenterY + Math.sin(angle) * holeRadius,
                        vx: Math.cos(angle) * radialSpeed - Math.sin(angle) * swirlSpeed,
                        vy: Math.sin(angle) * radialSpeed + Math.cos(angle) * swirlSpeed,
                        alpha: 1.0,
                        decay: decay,
                        size: isFirework ? (0.5 + Math.random() * 1.3) : (0.4 + Math.random() * 1.1 + smoothBass * 0.5),
                        hue: targetHue + (Math.random() - 0.5) * (isFirework ? 40 : 20),
                        isFirework: isFirework,
                        friction: friction
                    });
                }
            }

            if (useBufferMode && isPlaying && audioCtx) {
                const currentSecs = audioCtx.currentTime - startTime;
                updateProgressUI(currentSecs, audioBuffer.duration);
            }

            
            const glowGrad = ctx.createRadialGradient(coreX, coreY, holeRadius * 0.5, coreX, coreY, glowRadius);
            glowGrad.addColorStop(0, `hsla(${baseHue + fxVertical * 25 + fxVerticalWave * 70}, 90%, 55%, ${0.28 * (0.6 + smoothBass * 0.4 + fxHorizontal * 0.85 + fxVerticalWave * 0.45)})`);
            glowGrad.addColorStop(0.25, `hsla(${baseHue + 25 + fxDiagonal * 25 + fxSpeed * 55 + fxHorizontalAlt * 90}, 85%, 45%, ${0.12 * (0.5 + smoothMid * 0.5 + fxHorizontal * 1.25 + fxHorizontalAlt * 0.9 + Math.abs(fxSpeed) * 0.8)})`);
            glowGrad.addColorStop(0.6, `hsla(${baseHue - 20}, 70%, 30%, 0.03)`);
            glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glowGrad;
            ctx.beginPath();
            ctx.arc(coreX, coreY, glowRadius, 0, Math.PI * 2);
            ctx.fill();

            
            ctx.globalCompositeOperation = 'source-over';
            for (let r = 0; r < totalRays; r++) {
                const baseAngle = (r / totalRays) * Math.PI * 2 + (time * (0.015 + fxDiagonal * 0.045 + fxSpeed * 0.11));
                
                for (let d = 0; d < dotsPerRay; d++) {
                    const normD = d / dotsPerRay;
                    const matrixPulse = 1.0 + smoothBass * 0.15 * (1.0 - normD);
                    const baseDistance = holeRadius + Math.pow(normD, 1.3) * (minScreenDim * 0.95);
                    
                    let hoverRipple = 0;
                    if (hoverIntensity > 0.01) {
                        const ripplePhase = (baseDistance * 0.018) - hoverWaveTime;
                        hoverRipple = Math.sin(ripplePhase) * 22 * hoverIntensity * (1.0 - normD);
                    }
                    
                    const distance = (baseDistance * matrixPulse) + hoverRipple;
                    const waveFrequency = 0.012;
                    const wavePhase = distance * waveFrequency - time * 1.6;
                    
                    let angleOffset = Math.sin(wavePhase) * (0.03 + smoothMid * 0.12 + fxVertical * 0.06);
                    angleOffset += Math.cos(baseAngle * 3 - time * 0.5) * 0.015 * smoothHigh;
                    angleOffset += Math.sin(time * 7.0 + normD * 18.0) * fxVertical * 0.025;
                    
                    const finalAngle = baseAngle + angleOffset;

                    let ptX = kineticCenterX + Math.cos(finalAngle) * distance;
                    let ptY = kineticCenterY + Math.sin(finalAngle) * distance;

                    ptX += viewOffsetX * (normD * 0.28);
                    ptY += viewOffsetY * (normD * 0.28);

                    let dotSize = 0.7 + (1.0 - normD) * 1.4 + (smoothBass * 0.8);
                    if (window.innerWidth < 768) dotSize *= 0.85; 
                    
                    let alpha = 0.35;
                    if (normD > 0.7) { alpha = 0.35 * (1.0 - (normD - 0.7) / 0.3); }
                    if (normD < 0.1) { alpha *= (normD / 0.1); }

                    ctx.fillStyle = `hsla(${baseHue + 10}, 50%, 88%, ${alpha})`;
                    ctx.fillRect(ptX - dotSize / 2, ptY - dotSize / 2, dotSize, dotSize);
                }
            }


            ctx.globalCompositeOperation = 'lighter'; 
            for (let i = sparks.length - 1; i >= 0; i--) {
                const p = sparks[i];
                
                const dx = p.x - coreX;
                const dy = p.y - coreY;
                const dist = Math.hypot(dx, dy);
                
                if (dist > 10) {
                    
                    const gravityFactor = p.isFirework ? 0.15 : 1.0;
                    const pull = ((0.04 + smoothBass * 0.08) / (dist * 0.008)) * gravityFactor;
                    p.vx -= (dx / dist) * pull;
                    p.vy -= (dy / dist) * pull;
                }
                

                p.x += p.vx + (Math.sin(p.y * 0.04 + time) * 0.15 * smoothMid);
                p.y += p.vy + (Math.cos(p.x * 0.04 + time) * 0.15 * smoothMid);
                
                p.vx *= p.friction; 
                p.vy *= p.friction;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    sparks.splice(i, 1);
                    continue;
                }

                ctx.fillStyle = `hsla(${p.hue}, 100%, 82%, ${p.alpha})`;
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                
                if (p.size > 1.1) {
                    ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${p.alpha * 0.25})`;
                    ctx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
                }
            }
            

            if (fxVertical > 0.04) {
                ctx.globalCompositeOperation = 'lighter';
                const arcCount = window.innerWidth < 768 ? 6 : 11;
                for (let a = 0; a < arcCount; a++) {
                    const startAngle = Math.random() * Math.PI * 2;
                    const arcRadius = holeRadius * (1.04 + Math.random() * 0.28);
                    const points = 8 + Math.floor(Math.random() * 5);

                    ctx.beginPath();
                    for (let p = 0; p <= points; p++) {
                        const t = p / points;
                        const angle = startAngle + t * (0.35 + Math.random() * 0.65);
                        const jitter = (Math.random() - 0.5) * 34 * fxVertical;
                        const x = coreX + Math.cos(angle) * (arcRadius + jitter);
                        const y = coreY + Math.sin(angle) * (arcRadius + jitter);
                        if (p === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }

                    ctx.strokeStyle = `hsla(${baseHue + 50}, 100%, 72%, ${0.18 + fxVertical * 0.55})`;
                    ctx.lineWidth = 1.0 + fxVertical * 2.8;
                    ctx.stroke();
                }
            }

            if (fxVerticalWave > 0.04) {
                ctx.globalCompositeOperation = 'lighter';
                const waveCount = window.innerWidth < 768 ? 3 : 5;
                for (let vw = 0; vw < waveCount; vw++) {
                    const rr = holeRadius * (1.22 + vw * 0.20 + Math.sin(time * 2.0 + vw) * 0.035);
                    ctx.strokeStyle = `hsla(${baseHue + 110}, 100%, 70%, ${0.08 + fxVerticalWave * 0.16})`;
                    ctx.lineWidth = 1.0 + fxVerticalWave * 1.4;
                    ctx.beginPath();
                    ctx.arc(coreX, coreY, rr, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            if (fxFlash > 0.03) {
                ctx.globalCompositeOperation = 'screen';
                const glitchGlow = ctx.createRadialGradient(coreX, coreY, 0, coreX, coreY, glowRadius * 0.85);
                glitchGlow.addColorStop(0, `hsla(${baseHue + 35}, 100%, 75%, ${fxFlash * 0.08})`);
                glitchGlow.addColorStop(0.5, `hsla(${baseHue + 10}, 90%, 55%, ${fxFlash * 0.025})`);
                glitchGlow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glitchGlow;
                ctx.beginPath();
                ctx.arc(coreX, coreY, glowRadius * 0.85, 0, Math.PI * 2);
                ctx.fill();
            }


            ctx.globalCompositeOperation = 'lighter';
            for (let w = energyWaves.length - 1; w >= 0; w--) {
                const wave = energyWaves[w];
                wave.radius += wave.speed;
                wave.alpha *= 0.955;
                wave.width += 1.25;

                const maxRadius = Math.max(canvas.width, canvas.height) * 0.82;
                if (wave.alpha < 0.018 || wave.radius > maxRadius) {
                    energyWaves.splice(w, 1);
                    continue;
                }

                const waveGrad = ctx.createRadialGradient(
                    coreX, coreY, Math.max(0, wave.radius - wave.width * 1.8),
                    coreX, coreY, wave.radius + wave.width * 2.2
                );
                waveGrad.addColorStop(0.00, 'rgba(0,0,0,0)');
                waveGrad.addColorStop(0.36, `hsla(${wave.hue}, 100%, 68%, ${wave.alpha * 0.035})`);
                waveGrad.addColorStop(0.50, `hsla(${wave.hue + 28}, 100%, 78%, ${wave.alpha * 0.13})`);
                waveGrad.addColorStop(0.68, `hsla(${wave.hue}, 100%, 62%, ${wave.alpha * 0.035})`);
                waveGrad.addColorStop(1.00, 'rgba(0,0,0,0)');

                ctx.fillStyle = waveGrad;
                ctx.beginPath();
                ctx.arc(coreX, coreY, wave.radius + wave.width * 2.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = `hsla(${wave.hue + 15}, 100%, 78%, ${wave.alpha * 0.10})`;
                ctx.lineWidth = Math.max(1.0, wave.width * 0.08);
                ctx.beginPath();
                ctx.arc(coreX, coreY, wave.radius, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.globalCompositeOperation = 'source-over'; 


            ctx.globalCompositeOperation = 'lighter';
            const ringCount = window.innerWidth < 768 ? 3 : 5;
            for (let j = 0; j < ringCount; j++) {
                const ringDir = (j % 2 === 0) ? 1 : -0.62;
                const ringBaseRadius = holeRadius * (1.06 + j * 0.055 + fxHorizontal * 0.070 + fxHorizontalAlt * 0.050);
                const rTime = bhRotation * (1.0 + j * 0.40) * ringDir + time * (0.18 + j * 0.08);
                const ringPoints = window.innerWidth < 768 ? 48 : 72;
                ctx.beginPath();
                for (let i = 0; i <= ringPoints; i++) {
                    const angle = (i / ringPoints) * Math.PI * 2;
                    const warp = Math.sin(angle * (3 + j) + rTime) * (4.5 + smoothBass * 17 + fxVertical * 17 + fxVerticalWave * 21)
                               + Math.cos(angle * 2 - rTime * 0.75) * (2.8 + smoothHigh * 7 + fxHorizontal * 13 + fxHorizontalAlt * 17);
                    const micro = Math.sin(angle * 7 + time * 2.8 + j * 1.3) * (1.2 + smoothMid * 2.0);
                    const r = ringBaseRadius + warp + micro;
                    const x = coreX + Math.cos(angle) * r;
                    const y = coreY + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                const ringHue = (baseHue + j * 12 + bhPulse * 28) % 360;
                const ringAlpha = (0.38 - j * 0.065) * (0.55 + smoothBass * 0.45 + bhPulse * 0.25);
                ctx.strokeStyle = `hsla(${ringHue}, 98%, 68%, ${Math.max(0, ringAlpha)})`;
                ctx.lineWidth = (1.8 + smoothBass * 3.0) * (1.0 - j * 0.10);
                ctx.stroke();
            }

            
            {
                const pr = holeRadius * (1.016 + bhPulse * 0.058);
                const pa = 0.42 + smoothBass * 0.38 + bhPulse * 0.22;
                const pg = ctx.createRadialGradient(coreX, coreY, pr * 0.88, coreX, coreY, pr * 1.14);
                pg.addColorStop(0, 'rgba(0,0,0,0)');
                pg.addColorStop(0.42, `hsla(${baseHue + 14}, 100%, 92%, ${pa * 0.52})`);
                pg.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = pg;
                ctx.beginPath();
                ctx.arc(coreX, coreY, pr * 1.14, 0, Math.PI * 2);
                ctx.fill();
            }

            const _hsR = [holeRadius * 1.052, holeRadius * 1.108, holeRadius * 1.076];
            const _hsH = [baseHue + 18, baseHue - 25, baseHue + 50];
            const _hsS = [3.8, 3.0, 2.4];
            const _hsW = [1.0, 0.68, 0.52];
            for (let h = 0; h < 3; h++) {
                const hx = coreX + Math.cos(bhOrbital[h]) * _hsR[h];
                const hy = coreY + Math.sin(bhOrbital[h]) * _hsR[h];
                const ha = (0.52 + smoothBass * 0.32 + bhPulse * 0.22) * _hsW[h];
                const hg = ctx.createRadialGradient(hx, hy, 0, hx, hy, _hsS[h] * 4.2);
                hg.addColorStop(0,   `hsla(${_hsH[h]}, 100%, 96%, ${ha})`);
                hg.addColorStop(0.28,`hsla(${_hsH[h]}, 100%, 74%, ${ha * 0.42})`);
                hg.addColorStop(1,   'rgba(0,0,0,0)');
                ctx.fillStyle = hg;
                ctx.beginPath();
                ctx.arc(hx, hy, _hsS[h] * 4.2, 0, Math.PI * 2);
                ctx.fill();
            }


            ctx.globalCompositeOperation = 'source-over';

            const lensingGrad = ctx.createRadialGradient(coreX, coreY, holeRadius * 0.86, coreX, coreY, holeRadius * 1.50);
            lensingGrad.addColorStop(0,    'rgba(0,0,0,0.97)');
            lensingGrad.addColorStop(0.26, 'rgba(0,0,0,0.84)');
            lensingGrad.addColorStop(0.60, 'rgba(0,0,0,0.28)');
            lensingGrad.addColorStop(1,    'rgba(0,0,0,0)');
            ctx.fillStyle = lensingGrad;
            ctx.beginPath();
            ctx.arc(coreX, coreY, holeRadius * 1.50, 0, Math.PI * 2);
            ctx.fill();

            ctx.globalCompositeOperation = 'lighter';
            {
                const cr = holeRadius * (1.0 + bhPulse * 0.044);
                const ca = 0.07 + smoothBass * 0.11 + bhPulse * 0.07;
                const cg = ctx.createRadialGradient(coreX, coreY, cr * 0.80, coreX, coreY, cr * 1.24);
                cg.addColorStop(0,    'rgba(0,0,0,0)');
                cg.addColorStop(0.44, `hsla(${baseHue + 192}, 100%, 68%, ${ca})`);
                cg.addColorStop(1,    'rgba(0,0,0,0)');
                ctx.fillStyle = cg;
                ctx.beginPath();
                ctx.arc(coreX, coreY, cr * 1.24, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.globalCompositeOperation = 'source-over';
            const _wa = 0.010 + smoothMid * 0.016 + bhPulse * 0.011;
            const _hp = 56;
            ctx.beginPath();
            for (let i = 0; i <= _hp; i++) {
                const a = (i / _hp) * Math.PI * 2;
                const wb = Math.sin(a * 5 + time * 2.1) * _wa
                         + Math.sin(a * 3 - time * 1.4) * _wa * 0.55
                         + Math.sin(a * 8 + time * 3.8) * _wa * 0.22;
                const r = holeRadius * (1.0 + wb);
                const px = coreX + Math.cos(a) * r;
                const py = coreY + Math.sin(a) * r;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();

            const depthGrad = ctx.createRadialGradient(
                coreX - holeRadius * 0.22, coreY - holeRadius * 0.18, holeRadius * 0.04,
                coreX, coreY, holeRadius
            );
            depthGrad.addColorStop(0,    '#070510');
            depthGrad.addColorStop(0.22, '#040309');
            depthGrad.addColorStop(0.55, '#020204');
            depthGrad.addColorStop(1,    '#000000');
            ctx.fillStyle = depthGrad;
            ctx.fill();
        }
    </script>
